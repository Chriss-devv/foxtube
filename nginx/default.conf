map $http_x_forwarded_proto $ft_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

# Dynamic cookie domain map to allow sessions on both local IP and public domain.
map $host $ft_cookie_domain {
    yourdomain.example  "yourdomain.example";
    default         ""; # strips the domain attribute to allow host-only cookies on IP access
}

server {
    listen 80 default_server;
    server_name _;
    

    location = /foxtube-profile.json {
        # Hotlink guard for the recommendation profile. Add your own domain/host(s) here.
        if ($http_referer !~* "^https?://(yourdomain\.example|127\.0\.0\.1|localhost)(/|:|$)") { return 403; }
        alias /usr/share/nginx/html/foxtube-profile.json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/json; charset=utf-8";
        add_header X-Robots-Tag "noindex, nofollow, noarchive";
    }


    # Chris-only Takeout subscriptions route: upstream renders a shell; overlay fills it from embedded Takeout data.
    location = /feed/subscriptions {
        proxy_pass http://invidious:3000/feed/popular?ft_subscriptions=1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ft_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Accept-Encoding "";
        proxy_cookie_domain yourdomain.example $ft_cookie_domain;
        proxy_cookie_flags * nosecure;
        sub_filter '</head>' "<script>(function(){try{var l=(localStorage.getItem('ft_layout')||'foxtube');document.documentElement.classList.add('ft-layout-'+l);var t=(localStorage.getItem('ft_theme')||'dracula');document.documentElement.setAttribute('data-ft-theme',t);}catch(e){}})();</script></head>";
        sub_filter '</body>' '<script defer src="/js/yt-actions.js?v=foxrec-v3-layouts"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
    }


    # Chris-only Takeout history route.
    location = /feed/history {
        proxy_pass http://invidious:3000/feed/popular?ft_history=1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ft_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Accept-Encoding "";
        proxy_cookie_domain yourdomain.example $ft_cookie_domain;
        proxy_cookie_flags * nosecure;
        sub_filter '</head>' "<script>(function(){try{var l=(localStorage.getItem('ft_layout')||'foxtube');document.documentElement.classList.add('ft-layout-'+l);var t=(localStorage.getItem('ft_theme')||'dracula');document.documentElement.setAttribute('data-ft-theme',t);}catch(e){}})();</script></head>";
        sub_filter '</body>' '<script defer src="/js/yt-actions.js?v=foxrec-v3-layouts"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
    }


    # Chris-only Takeout playlists route.
    location = /feed/playlists {
        proxy_pass http://invidious:3000/feed/popular?ft_playlists=1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ft_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Accept-Encoding "";
        proxy_cookie_domain yourdomain.example $ft_cookie_domain;
        proxy_cookie_flags * nosecure;
        sub_filter '</head>' "<script>(function(){try{var l=(localStorage.getItem('ft_layout')||'foxtube');document.documentElement.classList.add('ft-layout-'+l);var t=(localStorage.getItem('ft_theme')||'dracula');document.documentElement.setAttribute('data-ft-theme',t);}catch(e){}})();</script></head>";
        sub_filter '</body>' '<script defer src="/js/yt-actions.js?v=foxrec-v3-layouts"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    location /js/yt-actions.js {
        alias /usr/share/nginx/html/yt-actions.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Always revalidate the custom stylesheet so design edits show up on a normal
    # refresh instead of being frozen by Invidious' 30-day asset cache.
    location = /css/default.css {
        proxy_pass http://invidious:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ft_forwarded_proto;
        proxy_set_header Accept-Encoding "";
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Anonymous-safe home: global Popular. Logged-in users can access Para ti from nav.
    location = / {
        return 302 $ft_forwarded_proto://$http_host/feed/popular;
    }
    

    # FoxTube Shorts virtual route. Upstream renders a normal page; overlay transforms it.
    location = /shorts {
        proxy_pass http://invidious:3000/feed/popular?ft_shorts=1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ft_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Accept-Encoding "";
        proxy_cookie_domain yourdomain.example $ft_cookie_domain;
        proxy_cookie_flags * nosecure;
        sub_filter '</head>' "<script>(function(){try{var l=(localStorage.getItem('ft_layout')||'foxtube');document.documentElement.classList.add('ft-layout-'+l);var t=(localStorage.getItem('ft_theme')||'dracula');document.documentElement.setAttribute('data-ft-theme',t);}catch(e){}})();</script></head>";
        sub_filter '</body>' '<script defer src="/js/yt-actions.js?v=foxrec-v3-layouts"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    location / {
        proxy_pass http://invidious:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ft_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept-Encoding "";
        
        # Dynamic cookie domain rewrite
        proxy_cookie_domain yourdomain.example $ft_cookie_domain;
        
        # Strip Secure flag globally to allow cookies to work on both plain HTTP and HTTPS
        proxy_cookie_flags * nosecure;

        # Inject custom UI after Invidious has rendered the full body.
        sub_filter '</head>' "<script>(function(){try{var l=(localStorage.getItem('ft_layout')||'foxtube');document.documentElement.classList.add('ft-layout-'+l);var t=(localStorage.getItem('ft_theme')||'dracula');document.documentElement.setAttribute('data-ft-theme',t);}catch(e){}})();</script></head>";
        sub_filter '</body>' '<script defer src="/js/yt-actions.js?v=foxrec-v3-layouts"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
